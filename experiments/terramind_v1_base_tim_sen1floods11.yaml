# ─────────────────────────────────────────────────────────────────────────────
# TerraMind v1 Base — Sen1Floods11
# COMMENTED OUT ANY LINE POINTING TO LABELS TO ATTEMPT ZERO-SHOT TIM
#
# This config is as close as practical to the original TerraMind repo config,
# with three additions clearly marked:
#   [ADDED] ModelCheckpoint   — saves the best checkpoint by name
#   [ADDED] CSVLogger         — writes a human-readable metrics.csv
#   [ADDED] predict section   — enables terratorch predict without CLI overrides
#
# The string __OUTPUT_DIR__ is a placeholder. The run script replaces it with
# a timestamped path (e.g. output/sen1floods11_base_20260407_2038) and saves
# the result as run_config.yaml inside that folder before calling terratorch.
# You never edit that value here manually.
#
# To run a different backbone:
#   Change backbone: terramind_v1_base  →  terramind_v1_large
#   Change SelectIndices: [2, 5, 8, 11] →  [5, 11, 17, 23]
#
# To run BurnScars:
#   Copy this file to configs/terramind_v1_base_burnscars.yaml
#   Update all data paths, splits, image_grep, label_grep, num_classes,
#   class_names, and the EXPERIMENT_NAME in run_experiment.aqua
# ─────────────────────────────────────────────────────────────────────────────

# lightning.pytorch==2.1.1
seed_everything: 42

trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed

  # All output for this run lands here.
  # __OUTPUT_DIR__ is replaced by the run script — do not edit this line.
  default_root_dir: __OUTPUT_DIR__

  logger:
    # TensorBoard logger — same as the original TerraMind config (logger: true)
    # View with: tensorboard --logdir output/  (requires port-forward on HPC)
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: __OUTPUT_DIR__
        name: ""      # prevents an extra subfolder being created
        version: ""   # prevents auto-incrementing version_0, version_1 etc.

    # [ADDED] CSVLogger — writes metrics.csv so results are readable without TensorBoard
    - class_path: lightning.pytorch.loggers.CSVLogger
      init_args:
        save_dir: __OUTPUT_DIR__
        name: ""
        version: ""

  callbacks:
    - class_path: RichProgressBar

    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch   # print LR once per epoch, not every step

    # [ADDED] ModelCheckpoint — saves best.ckpt (highest val/mIoU) and last.ckpt
    # Without this, Lightning only saves the last epoch. The fixed filename
    # "best" means all downstream steps can always find the checkpoint.
    - class_path: ModelCheckpoint
      init_args:
        monitor: val/mIoU   # the exact metric name TerraTorch logs
        mode: max
        save_top_k: 1       # keep only the single best (saves disk space)
        save_last: true
        filename: best
        verbose: true       # prints a line each time a new best is found

  max_epochs: 100
  log_every_n_steps: 5


# ─────────────────────────────────────────────────────────────────────────────
# DATA
# ─────────────────────────────────────────────────────────────────────────────
data:
  class_path: terratorch.datamodules.GenericMultiModalDataModule
  init_args:
    task: 'segmentation'
    batch_size: 8
    num_workers: 8

    modalities:
      - S2L1C   # Sentinel-2 Level 1C: 13-band optical
      - S1GRD   # Sentinel-1 GRD: 2-band SAR (radar)

    # RGB preview bands (for plots and logging). New dict format — rgb_modality is deprecated.
    rgb_indices:
      S2L1C: [3, 2, 1]   # Red, Green, Blue (0-indexed band positions)

    # ── Train / Val / Test ────────────────────────────────────────────────────
    train_data_root:
      S2L1C: data/sen1floods11_v1.1/data/S2L1CHand
      S1GRD: data/sen1floods11_v1.1/data/S1GRDHand
    train_label_data_root: data/sen1floods11_v1.1/data/LabelHand

    val_data_root:
      S2L1C: data/sen1floods11_v1.1/data/S2L1CHand
      S1GRD: data/sen1floods11_v1.1/data/S1GRDHand
    val_label_data_root: data/sen1floods11_v1.1/data/LabelHand

    test_data_root:
      S2L1C: data/sen1floods11_v1.1/data/S2L1CHand
      S1GRD: data/sen1floods11_v1.1/data/S1GRDHand
    test_label_data_root: data/sen1floods11_v1.1/data/LabelHand

    train_split: data/sen1floods11_v1.1/splits/flood_train_data.txt
    val_split:   data/sen1floods11_v1.1/splits/flood_valid_data.txt
    test_split:  data/sen1floods11_v1.1/splits/flood_test_data.txt

    # [ADDED] Predict section — same images as the test split.
    # terratorch predict uses these instead of test_data_root.
    # We run predictions on the test scenes so we can compare them to ground truth.
    predict_data_root:
      S2L1C: data/sen1floods11_v1.1/data/S2L1CHand
      S1GRD: data/sen1floods11_v1.1/data/S1GRDHand
    # predict_split: data/sen1floods11_v1.1/splits/flood_test_data.txt

    image_grep:
      S2L1C: "*_S2Hand.tif"
      S1GRD: "*_S1Hand.tif"
    label_grep: "*_LabelHand.tif"

    no_label_replace: -1
    no_data_replace: 0
    num_classes: 2

    # TerraMind official normalisation statistics — do not change
    means:
      S2L1C: [2357.089, 2137.385, 2018.788, 2082.986, 2295.651, 2854.537, 3122.849, 3040.560, 3306.481, 1473.847, 506.070, 2472.825, 1838.929]
      S2L2A: [1390.458, 1503.317, 1718.197, 1853.910, 2199.100, 2779.975, 2987.011, 3083.234, 3132.220, 3162.988, 2424.884, 1857.648]
      S1GRD: [-12.599, -20.293]
      S1RTC: [-10.93, -17.329]
      RGB:   [87.271, 80.931, 66.667]
      DEM:   [670.665]

    stds:
      S2L1C: [1624.683, 1675.806, 1557.708, 1833.702, 1823.738, 1733.977, 1732.131, 1679.732, 1727.26, 1024.687, 442.165, 1331.411, 1160.419]
      S2L2A: [2106.761, 2141.107, 2038.973, 2134.138, 2085.321, 1889.926, 1820.257, 1871.918, 1753.829, 1797.379, 1434.261, 1334.311]
      S1GRD: [5.195, 5.890]
      S1RTC: [4.391, 4.459]
      RGB:   [58.767, 47.663, 42.631]
      DEM:   [951.272]

    train_transform:
      - class_path: albumentations.D4
      - class_path: albumentations.pytorch.transforms.ToTensorV2


# ─────────────────────────────────────────────────────────────────────────────
# MODEL
# ─────────────────────────────────────────────────────────────────────────────
model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory

    model_args:
      backbone: terramind_v1_base_tim
      backbone_pretrained: true
      backbone_modalities:
        - S2L1C
        - S1GRD
      backbone_tim_modalities:
        - LULC
      backbone_merge_method: mean

      necks:
        - name: SelectIndices
          indices: [2, 5, 8, 11]   # base model has 12 layers — sample 4 evenly
                                    # large model: change to [5, 11, 17, 23]
        - name: ReshapeTokensToImage
          remove_cls_token: False
        - name: LearnedInterpolateToPyramidal

      decoder: UNetDecoder
      decoder_channels: [512, 256, 128, 64]

      head_dropout: 0.1
      num_classes: 2

    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false

    class_names:
      - Others   # class 0
      - Flood    # class 1


# ─────────────────────────────────────────────────────────────────────────────
# OPTIMISER
# ─────────────────────────────────────────────────────────────────────────────
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 2.e-5

lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss
    factor: 0.5
    patience: 5
