[workspace]
channels = ["conda-forge", "nvidia", "pytorch"]
name = "terramind"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
rasterio = ">=1.4.4,<2"
pyproj = ">=3.7.2,<4"
setuptools = "<81"
geopandas = ">=1.1.3,<2"
h5py = ">=3.16.0,<4"
rioxarray = ">=0.19.0,<0.20"
matplotlib = ">=3.10.9,<4"
ipykernel = ">=7.2.0,<8"

[system-requirements]
cuda = "12.4"

[pypi-dependencies]
terratorch = ">=1.2.4"
jupyter = ">=1.1.1, <2"
gdown = ">=5.2.1, <6"
tensorboard = ">=2.20.0, <3"
diffusers = "==0.30.0"
torch = { version = ">=2.4.0", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu124" }
