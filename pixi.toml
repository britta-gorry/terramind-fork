[workspace]
channels = ["conda-forge", "nvidia", "pytorch"]
name = "terramind"
platforms = [
    { platform = "linux-64", cuda = "13.2" },
    { platform = "win-64" }
]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
rasterio = ">=1.4.4,<2"
pyproj = ">=3.7.2,<4"
setuptools = "<81"
geopandas = ">=1.1.3,<2"
h5py = ">=3.16.0,<4"
rioxarray = ">=0.19.0,<0.20"
matplotlib = ">=3.10.9,<4"
ipykernel = ">=7.2.0,<8"
huggingface_hub = ">=1.16.1,<2"
gdal = ">=3.12.3,<4"
openjpeg = ">=2.5.4,<3"
libgdal-jp2openjpeg = ">=3.12.3,<4"
yaml = ">=0.2.5,<0.3"
"ruamel.yaml" = ">=0.19.1,<0.20"
stackstac = ">=0.5.1,<0.6"
pystac-client = ">=0.9.0,<0.10"
planetary-computer = ">=1.0.0,<2"
earthengine-api = ">=1.7.29,<2"
requests = ">=2.34.2,<3"
libgdal-core = ">=3.12.3,<4"

[pypi-dependencies]
terratorch = ">=1.2.4"
jupyter = ">=1.1.1, <2"
gdown = ">=5.2.1, <6"
tensorboard = ">=2.20.0, <3"
diffusers = "==0.30.0"
torch = { version = ">=2.4.0", index = "https://download.pytorch.org/whl/cu132" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu132" }
